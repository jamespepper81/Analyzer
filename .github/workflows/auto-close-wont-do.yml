name: Auto-close Wont Do Issues

on:
  issues:
    types: [edited, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to check and close if Wont Do"
        required: true
        type: number

jobs:
  close_wont_do:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check project status and close if Wont Do
        uses: actions/github-script@v7
        with:
          script: |
            // Get issue number from either the event or workflow_dispatch input
            let issueNumber, issueNodeId;
            
            if (context.eventName === 'workflow_dispatch') {
              // Manual trigger - get issue details first
              issueNumber = Number(context.payload.inputs.issue_number);
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              issueNodeId = issue.node_id;
            } else {
              // Automatic trigger from issue event
              issueNumber = context.issue.number;
              issueNodeId = context.payload.issue.node_id;
            }
            
            console.log(`Processing issue #${issueNumber}...`);
            
            try {
              // Query the issue's project status using GraphQL
              const query = `
                query($issueId: ID!) {
                  node(id: $issueId) {
                    ... on Issue {
                      projectItems(first: 10) {
                        edges {
                          node {
                            id
                            project {
                              title
                            }
                            fieldValues(first: 20) {
                              nodes {
                                ... on ProjectV2ItemFieldSingleSelectValue {
                                  name
                                  field {
                                    ... on ProjectV2SingleSelectField {
                                      name
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              
              const result = await github.graphql(query, {
                issueId: issueNodeId
              });
              
              console.log('GraphQL result:', JSON.stringify(result, null, 2));
              
              // Check if issue has project items
              const projectItems = result.node?.projectItems?.edges || [];
              
              if (projectItems.length === 0) {
                console.log(`Issue #${issueNumber} is not in any project. Skipping.`);
                return;
              }
              
              // Look for "Status" field with "Wont Do" value
              let foundWontDoStatus = false;
              
              for (const edge of projectItems) {
                const projectItem = edge.node;
                const projectTitle = projectItem.project?.title || 'Unknown';
                const fieldValues = projectItem.fieldValues?.nodes || [];
                
                for (const fieldValue of fieldValues) {
                  const fieldName = fieldValue.field?.name;
                  const valueName = fieldValue.name;
                  
                  console.log(`Project: ${projectTitle}, Field: ${fieldName}, Value: ${valueName}`);
                  
                  if (fieldName === 'Status' && valueName === 'Wont Do') {
                    foundWontDoStatus = true;
                    console.log(`✓ Found "Won't Do" status in project "${projectTitle}"`);
                    break;
                  }
                }
                
                if (foundWontDoStatus) break;
              }
              
              if (foundWontDoStatus) {
                // Close the issue
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  state_reason: 'not_planned'
                });
                
                // Add a comment explaining the closure
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: '🤖 This issue was automatically closed because its status was set to "Won't Do" in the project board.'
                });
                
                console.log(`✓ Issue #${issueNumber} closed successfully.`);
              } else {
                console.log(`Issue #${issueNumber} does not have "Wont Do" status. Skipping.`);
              }
              
            } catch (error) {
              console.error('Error processing issue:', error);
              core.setFailed(`Failed to process issue: ${error.message}`);
            }
