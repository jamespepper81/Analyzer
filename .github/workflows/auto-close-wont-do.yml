name: Auto-close Won't Do Issues

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: number
      status:
        description: "Issue status to validate before closing"
        required: false
        default: "Wont Do"
        type: string

jobs:
  close_wont_do:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Auto-close the issue when status is Won't Do
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;

            // Get issue number from workflow_dispatch input
            const issue_number = Number(core.getInput("issue_number"));

            if (!issue_number) {
              core.setFailed("No issue number provided. This workflow must be manually dispatched with an issue number input.");
              return;
            }

            // Get the status parameter (only available via workflow_dispatch)
            // Note: GitHub Actions does not support projects_v2_item as a trigger event,
            // so this workflow must be manually triggered to close issues.
            const status = core.getInput("status");

            if (status !== "Wont Do") {
              console.log(`Issue #${issue_number} is not marked as "Wont Do" (status: ${status ?? "unknown"}). Skipping.`);
              return;
            }

            await github.rest.issues.update({
              owner: repo.owner,
              repo: repo.repo,
              issue_number,
              state: "closed"
            });

            console.log(`Issue #${issue_number} closed because its status was set to "Wont Do".`);
