name: Auto-close Won't Do Issues

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: number
      status:
        description: "Issue status to validate before closing"
        required: false
        default: "Wont Do"
        type: string
  issues:
    types: [edited]

jobs:
  close_wont_do:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Auto-close the issue when status is Wont Do
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number =
              context.issue?.number ?? Number(core.getInput("issue_number"));
            const repo = context.repo;

            if (!issue_number) {
              core.setFailed("No issue number provided. This workflow runs on issue edits or manual dispatch with an issue number input.");
              return;
            }

            const status =
              context.payload?.issue?.status?.name ??
              context.payload?.issue?.status ??
              context.payload?.changes?.status?.to?.name ??
              context.payload?.changes?.status?.to ??
              core.getInput("status");

            if (status !== "Wont Do") {
              console.log(`Issue #${issue_number} is not marked as "Wont Do" (status: ${status ?? "unknown"}). Skipping.`);
              return;
            }

            await github.rest.issues.update({
              owner: repo.owner,
              repo: repo.repo,
              issue_number,
              state: "closed"
            });

            console.log(`Issue #${issue_number} closed because its status was set to "Wont Do".`);
