name: Auto-close Won't Do Issues

on:
  issues:
    types: [labeled]

jobs:
  close_wont_do:
    if: github.event.label.name == "Won't Do"
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Auto-close the issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const repo = context.repo;

            await github.rest.issues.update({
              owner: repo.owner,
              repo: repo.repo,
              issue_number,
              state: "closed"
            });

            console.log(`Issue #${issue_number} closed because it was labeled "Won't Do".`);
